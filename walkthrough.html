<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ARHAUS — Recorrido 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080808; overflow: hidden; width: 100vw; height: 100vh; font-family: 'Inter', sans-serif; font-weight: 300; }

  #renderCanvas {
    width: 100%; height: 100%;
    display: block;
    cursor: grab;
  }

  #renderCanvas.dblcursor { cursor: crosshair; }

  /* Icono de destino al hacer doble click */
  #moveIndicator {
    position: fixed;
    pointer-events: none;
    z-index: 30;
    display: none;
    transform: translate(-50%, -50%);
  }
  @keyframes markerAppear {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    60%  { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  @keyframes markerFade {
    0%   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  }

  /* Crosshair central sutil */
  #crosshair {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 16px; height: 16px;
    pointer-events: none;
    z-index: 20;
    opacity: 0.5;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: white;
    border-radius: 2px;
  }
  #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after  { height: 2px; width: 100%; top: 50%;  transform: translateY(-50%); }

  /* Back button */
  #backBtn {
    position: fixed; top: 24px; left: 28px;
    z-index: 50;
    display: none;
    align-items: center; gap: 10px;
    padding: 9px 20px;
    background: rgba(8,8,8,.72);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(184,155,106,.4);
    color: rgba(242,237,231,.75);
    text-decoration: none;
    font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
    transition: all .3s;
  }
  #backBtn:hover { border-color: #B89B6A; color: #F2EDE7; }
  #backBtn.show { display: flex; }

  /* Hint */
  #hint {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: rgba(8,8,8,.65);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 99px;
    padding: 10px 24px;
    color: rgba(242,237,231,.65);
    font-size: 12px; letter-spacing: .06em;
    pointer-events: none;
    white-space: nowrap;
    transition: opacity 1s;
  }

  /* Loading */
  #loading {
    position: fixed; inset: 0;
    background: #080808;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100; gap: 22px;
    transition: opacity 0.8s;
  }
  #loading .logo {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 28px; font-weight: 400;
    letter-spacing: .28em; color: #F2EDE7;
    text-transform: uppercase; margin-bottom: 4px;
  }
  #loading .subtitle {
    font-size: 10px; letter-spacing: .25em;
    text-transform: uppercase; color: #B89B6A;
    margin-bottom: 12px;
  }
  #loading p { color: rgba(242,237,231,.38); font-size: 11px; letter-spacing: .18em; }
  .bar-wrap { width: 200px; height: 1px; background: rgba(255,255,255,.1); }
  .bar-fill  { height: 100%; background: #B89B6A; width: 0%; transition: width 0.3s; }
  #enterBtn {
    display: none; margin-top: 16px;
    padding: 13px 46px;
    background: transparent;
    border: 1px solid rgba(184,155,106,.5);
    color: #F2EDE7; font-size: 11px;
    letter-spacing: .22em; text-transform: uppercase;
    cursor: pointer; transition: all .35s;
    font-family: 'Inter', sans-serif; font-weight: 300;
  }
  #enterBtn:hover { background: rgba(184,155,106,.12); border-color: #B89B6A; }
</style>
</head>
<body>

<canvas id="renderCanvas" tabindex="0"></canvas>
<div id="crosshair"></div>

<!-- Back to home -->
<a href="index.html" id="backBtn">← Arhaus</a>

<!-- Indicador visual al hacer doble click -->
<div id="moveIndicator">
  <svg width="52" height="52" viewBox="0 0 52 52">
    <circle cx="26" cy="26" r="23" fill="rgba(184,155,106,0.88)" stroke="white" stroke-width="1.5"/>
    <polygon points="26,12 38,35 26,29 14,35" fill="white"/>
  </svg>
</div>

<div id="hint">Arrastrá para mirar &nbsp;·&nbsp; Doble click para avanzar &nbsp;·&nbsp; Rueda para zoom</div>

<div id="loading">
  <p class="logo">Arhaus</p>
  <p class="subtitle">Recorrido Virtual 3D</p>
  <div class="bar-wrap"><div class="bar-fill" id="barFill"></div></div>
  <p id="loadingText">Cargando modelo...</p>
  <button id="enterBtn" onclick="enterScene()">Ingresar al espacio →</button>
</div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<script src="js/app.min.js"></script>
<script>
  // Show back button once scene is entered
  const _origEnter = window.enterScene;
  window.enterScene = function(){
    _origEnter && _origEnter();
    setTimeout(() => {
      document.getElementById('backBtn').classList.add('show');
    }, 800);
  };
</script>
</body>
</html>
